<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduAI - Sayfa Bulunamadı</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231D9E75'/><text x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-size='18' font-weight='700' fill='white'>E</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#f5f5f3;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.card{
  background:#fff;
  border:0.5px solid rgba(0,0,0,0.12);
  border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
  padding:48px 44px;
  width:100%;max-width:420px;
  text-align:center;
}
.logo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:18px;font-weight:700;color:#1a1a18;
  margin-bottom:36px;
}
.logo-dot{width:24px;height:24px;border-radius:7px;background:#1D9E75;flex-shrink:0;}
.code{font-size:64px;font-weight:800;color:#f0f0ee;letter-spacing:-2px;line-height:1;margin-bottom:12px;}
.title{font-size:20px;font-weight:600;color:#1a1a18;margin-bottom:8px;}
.subtitle{font-size:13px;color:#888780;line-height:1.6;margin-bottom:32px;}
.btn{
  display:inline-block;background:#1D9E75;color:#fff;
  text-decoration:none;border-radius:8px;padding:12px 28px;
  font-size:14px;font-weight:600;transition:background 0.15s;
  margin:0 6px 8px;
}
.btn:hover{background:#178a63;}
.btn-ghost{
  display:inline-block;background:#fff;color:#5f5e5a;
  text-decoration:none;border-radius:8px;padding:12px 28px;
  font-size:14px;font-weight:500;transition:background 0.15s;
  border:1px solid rgba(0,0,0,0.12);
  margin:0 6px 8px;
}
.btn-ghost:hover{background:#f5f5f3;}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div>EduAI</div>
  <div class="code">404</div>
  <h2 class="title">Sayfa Bulunamadı</h2>
  <p class="subtitle">Aradığın sayfa mevcut değil veya taşınmış olabilir.</p>
  <div>
    <a href="/" class="btn">Ana Sayfaya Dön</a>
    <a href="/login" class="btn-ghost">Giriş Yap</a>
  </div>
</div>
</body>
</html>
