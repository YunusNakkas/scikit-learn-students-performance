<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduAI - Şifre Sıfırla</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231D9E75'/><text x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-size='18' font-weight='700' fill='white'>E</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#f5f5f3;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.card{
  background:#fff;
  border:0.5px solid rgba(0,0,0,0.12);
  border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
  padding:40px 44px;
  width:100%;max-width:400px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  font-size:18px;font-weight:700;color:#1a1a18;
  margin-bottom:32px;
}
.logo-dot{width:24px;height:24px;border-radius:7px;background:#1D9E75;flex-shrink:0;}
.title{font-size:22px;font-weight:600;color:#1a1a18;margin-bottom:8px;}
.subtitle{font-size:13px;color:#888780;margin-bottom:24px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:12px;font-weight:500;color:#5f5e5a;}
.field input{
  border:1px solid rgba(0,0,0,0.18);border-radius:8px;
  padding:10px 13px;font-size:14px;color:#1a1a18;outline:none;
  transition:border-color 0.15s;
}
.field input:focus{border-color:#1D9E75;}
.msg{font-size:12px;min-height:18px;margin-bottom:8px;}
.msg.error{color:#d94f4f;}
.msg.success{color:#1D9E75;}
.btn{
  width:100%;background:#1D9E75;color:#fff;
  border:none;border-radius:8px;padding:12px;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:background 0.15s;margin-top:2px;
}
.btn:hover{background:#178a63;}
.btn:disabled{background:#a0c8bb;cursor:not-allowed;}
.back{font-size:12px;color:#888780;text-align:center;margin-top:18px;}
.back a{color:#1D9E75;text-decoration:none;font-weight:500;}
.back a:hover{text-decoration:underline;}
.invalid-token{text-align:center;padding:16px 0;}
.invalid-token p{color:#d94f4f;font-size:14px;margin-bottom:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div>EduAI</div>

  <div id="panelForm">
    <h2 class="title">Yeni Şifre Belirle</h2>
    <p class="subtitle">Hesabınız için yeni bir şifre oluşturun.</p>
    <div class="field">
      <label>Yeni Şifre</label>
      <input id="newPassword" type="password" placeholder="En az 6 karakter" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>Şifreyi Tekrarla</label>
      <input id="confirmPassword" type="password" placeholder="Şifrenizi tekrar girin" autocomplete="new-password"/>
    </div>
    <div id="msg" class="msg error"></div>
    <button id="resetBtn" class="btn">Şifremi Güncelle</button>
    <p class="back"><a href="/login">← Giriş sayfasına dön</a></p>
  </div>

  <div id="panelSuccess" style="display:none;">
    <div style="text-align:center;padding:16px 0;">
      <div style="font-size:40px;margin-bottom:16px;">✓</div>
      <h2 class="title" style="margin-bottom:8px;">Şifre Güncellendi</h2>
      <p style="color:#5f5e5a;font-size:14px;margin-bottom:24px;">Şifreniz başarıyla güncellendi. Yeni şifrenizle giriş yapabilirsiniz.</p>
      <a href="/login" style="display:inline-block;background:#1D9E75;color:#fff;text-decoration:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;">Giriş Yap</a>
    </div>
  </div>

  <div id="panelInvalid" style="display:none;">
    <div class="invalid-token">
      <p>Bu bağlantı geçersiz veya süresi dolmuş.</p>
      <a href="/login" style="display:inline-block;background:#1D9E75;color:#fff;text-decoration:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;">Giriş Sayfasına Dön</a>
    </div>
  </div>
</div>

<script>
  const API_BASE = window.location.port === "8000" || window.location.port === "" ? "" : "http://127.0.0.1:8000";
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (!token) {
    document.getElementById("panelForm").style.display = "none";
    document.getElementById("panelInvalid").style.display = "block";
  }

  document.getElementById("resetBtn").addEventListener("click", async () => {
    const newPass = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const msgEl   = document.getElementById("msg");
    const btn     = document.getElementById("resetBtn");

    msgEl.className = "msg error";
    msgEl.innerText = "";

    if (!newPass || !confirm) { msgEl.innerText = "Tüm alanları doldurun."; return; }
    if (newPass.length < 6)   { msgEl.innerText = "Şifre en az 6 karakter olmalı."; return; }
    if (newPass !== confirm)  { msgEl.innerText = "Şifreler eşleşmiyor."; return; }

    btn.disabled = true; btn.innerText = "Güncelleniyor...";
    try {
      const res  = await fetch(`${API_BASE}/auth/reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, new_password: newPass })
      });
      const data = await res.json();
      if (!res.ok) {
        msgEl.innerText = data.detail || "Bir hata oluştu.";
        if (res.status === 400 && data.detail && data.detail.includes("Geçersiz")) {
          document.getElementById("panelForm").style.display = "none";
          document.getElementById("panelInvalid").style.display = "block";
        }
        return;
      }
      document.getElementById("panelForm").style.display = "none";
      document.getElementById("panelSuccess").style.display = "block";
    } catch {
      msgEl.innerText = "Sunucuya bağlanılamadı.";
    } finally {
      btn.disabled = false; btn.innerText = "Şifremi Güncelle";
    }
  });

  ["newPassword","confirmPassword"].forEach(id =>
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("resetBtn").click();
    })
  );
</script>
</body>
</html>
